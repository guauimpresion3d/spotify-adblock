name: Build & Push to Docker Hub

on:
  push:
    branches: [ master, main ]
  schedule:
    # Sincroniza con upstream cada día a las 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # permite correrlo manualmente

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.sync.outputs.updated }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync fork with upstream
        id: sync
        run: |
          git remote add upstream https://github.com/AnanthVivekanand/spotify-adblock.git
          git fetch upstream
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/master)
          if [ "$LOCAL" != "$UPSTREAM" ]; then
            git merge upstream/master --no-edit
            git push origin master
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          fi

  build-and-push:
    needs: sync-upstream
    runs-on: ubuntu-latest
    # Corre si hubo actualización O si fue push manual/directo
    if: needs.sync-upstream.outputs.updated == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/spotify-adblock
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
